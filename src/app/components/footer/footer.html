<footer class="border-t border-[var(--color-border)] bg-[var(--color-bg)]">

  <!-- Gradient Top Line -->
  <div class="h-px bg-gradient-to-r from-transparent via-[var(--color-accent)] to-transparent"></div>

  <div class="container-custom px-4 py-12">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-start">

      <!-- Brand -->
      <div>
        <h3 class="text-lg font-bold gradient-text mb-2">Muhammad Shahadat Hossain</h3>
        <p class="text-[var(--color-text-secondary)] text-sm leading-relaxed">
          Software Engineer passionate about building enterprise applications with .NET, Angular, and PostgreSQL.
        </p>
      </div>

      <!-- Quick Links -->
      <div class="text-center">
        <h4 class="text-sm font-semibold text-[var(--color-text)] mb-3 uppercase tracking-wider">Quick Links</h4>
        <div class="flex flex-wrap justify-center gap-4">
          <a href="#hero" class="text-[var(--color-text-secondary)] hover:text-[var(--color-accent)] text-sm transition-colors">Home</a>
          <a href="#skills" class="text-[var(--color-text-secondary)] hover:text-[var(--color-accent)] text-sm transition-colors">Skills</a>
          <a href="#experience" class="text-[var(--color-text-secondary)] hover:text-[var(--color-accent)] text-sm transition-colors">Experience</a>
          <a href="#projects" class="text-[var(--color-text-secondary)] hover:text-[var(--color-accent)] text-sm transition-colors">Projects</a>
          <a href="#education" class="text-[var(--color-text-secondary)] hover:text-[var(--color-accent)] text-sm transition-colors">Education</a>
        </div>
      </div>

      <!-- Social Links -->
      <div class="text-center md:text-right">
        <h4 class="text-sm font-semibold text-[var(--color-text)] mb-3 uppercase tracking-wider">Connect</h4>
        <div class="flex justify-center md:justify-end gap-4">

             aria-label="LinkedIn">

              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>

          <!-- Email -->
          <a href="mailto:mshahadath26@gmail.com"
             class="text-[var(--color-text-secondary)] hover:text-[var(--color-accent)] transition-all duration-200 hover:-translate-y-1"
             aria-label="Email">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>

        </div>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="mt-10 pt-6 border-t border-[var(--color-border)] flex flex-col sm:flex-row justify-between items-center gap-4">
      <p class="text-[var(--color-text-secondary)] text-xs">
        &copy; {{ currentYear }} Muhammad Shahadat Hossain. All rights reserved.
      </p>
      <p class="text-[var(--color-text-secondary)] text-xs">
        Built with <span class="text-[var(--color-accent)]">Angular</span> &amp; <span class="text-[var(--color-accent)]">Tailwind CSS</span>
      </p>
    </div>
  </div>

  <!-- Back to Top -->
  <button
    (click)="scrollToTop()"
    class="fixed bottom-6 right-6 w-10 h-10 rounded-full bg-[var(--color-accent)] text-[var(--color-bg)] flex items-center justify-center shadow-lg hover:-translate-y-1 transition-all duration-200 z-40"
    aria-label="Back to top">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
    </svg>
  </button>
</footer>
