<section id="extracurricular" class="section-padding bg-[var(--color-bg-2)]/30">
  <div class="container-custom">

    <!-- Section Header -->
    <div class="text-center mb-12">
      <h2 class="text-3xl md:text-4xl font-bold mb-4">
        <span class="gradient-text">Extra Curricular Activities</span>
      </h2>
    </div>

    <!-- Activity Cards -->
    <div class="flex justify-center">
      @for (activity of activities; track activity.title) {
        <div class="card text-center flex flex-col items-center max-w-sm">

          <!-- Logo -->
          <img [src]="activity.logo" [alt]="activity.title"
               class="w-16 h-16 rounded-full object-cover bg-white border border-[var(--color-border)] mb-4" />

          <!-- Title -->
          <h3 class="text-base font-bold text-[var(--color-text)] mb-2 leading-snug">
            {{ activity.title }}
          </h3>

          <!-- Description -->
          <p class="text-[var(--color-text-secondary)] text-sm mb-1">{{ activity.description }}</p>

          <!-- Extra -->
          <p class="text-[var(--color-accent)] text-sm font-medium mb-3">{{ activity.extra }}</p>

          <!-- Period -->
          <p class="text-[var(--color-text-secondary)] text-xs">{{ activity.period }}</p>
        </div>
      }
    </div>

  </div>
</section>
