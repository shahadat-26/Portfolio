<section id="hero" class="relative min-h-screen flex items-center section-padding overflow-hidden">

  <!-- Background Particles -->
  <div class="particles-container">
    <div class="particle" style="--x: 10%; --y: 20%; --duration: 6s; --delay: 0s;"></div>
    <div class="particle" style="--x: 80%; --y: 15%; --duration: 8s; --delay: 1s;"></div>
    <div class="particle" style="--x: 30%; --y: 70%; --duration: 7s; --delay: 2s;"></div>
    <div class="particle" style="--x: 70%; --y: 60%; --duration: 9s; --delay: 0.5s;"></div>
    <div class="particle" style="--x: 50%; --y: 40%; --duration: 6s; --delay: 3s;"></div>
    <div class="particle" style="--x: 90%; --y: 80%; --duration: 8s; --delay: 1.5s;"></div>
    <div class="particle" style="--x: 20%; --y: 85%; --duration: 7s; --delay: 2.5s;"></div>
    <div class="particle" style="--x: 60%; --y: 30%; --duration: 10s; --delay: 0.8s;"></div>
  </div>

  <!-- Gradient Orbs -->
  <div class="absolute top-1/4 -left-32 w-64 h-64 bg-[#06B6D4]/10 rounded-full blur-3xl"></div>
  <div class="absolute bottom-1/4 -right-32 w-64 h-64 bg-[#0284C7]/10 rounded-full blur-3xl"></div>

  <div class="container-custom w-full relative z-10">
    <div class="max-w-3xl">

      <!-- Greeting -->
      <p class="text-[var(--color-accent)] text-sm font-medium mb-4 animate-fade-in tracking-widest uppercase">
        Hi there! I'm
      </p>

      <!-- Name -->
      <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold mb-4 animate-slide-up text-white leading-tight">
        Muhammad <br> Shahadat Hossain
      </h1>

      <!-- Title -->
      <h2 class="text-xl md:text-2xl lg:text-3xl font-semibold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent mb-6 animate-slide-up"
          style="animation-delay: 0.1s;">
        Software Engineer &bull; Problem Solver
      </h2>

      <!-- About -->
      <p class="text-[var(--color-text-secondary)] text-base md:text-lg leading-relaxed mb-8 max-w-2xl animate-slide-up"
         style="animation-delay: 0.2s;">
        <span class="text-blue-400 font-semibold">.NET</span> and <span class="text-blue-400 font-semibold">Angular</span> Developer with <span class="text-blue-400 font-semibold">4 years</span> experience
        in developing enterprise applications and mission-critical products.
        Poised to drive innovation and excellence.
      </p>

      <!-- CTA Buttons -->
      <div class="flex flex-wrap gap-4 mb-10 animate-slide-up" style="animation-delay: 0.3s;">
        <a href="#experience" class="btn-primary inline-flex items-center gap-2">
          Explore My Work
        </a>
        <a href="#contact" class="btn-secondary inline-flex items-center gap-2">
          Get In Touch
        </a>
      </div>

    </div>
  </div>

  <!-- Scroll Down Indicator -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 animate-float">
    <svg class="w-6 h-6 text-[var(--color-text-secondary)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
    </svg>
  </div>
</section>
