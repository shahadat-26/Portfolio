<section id="education" class="section-padding bg-[var(--color-bg)]">
  <div class="container-custom">

    <!-- Section Header -->
    <div class="text-center mb-12">
      <h2 class="text-3xl md:text-4xl font-bold mb-4">
        <span class="gradient-text">Education</span>

      </h2>
      <p class="text-[var(--color-text-secondary)] max-w-2xl mx-auto">
        Academic background and qualifications.
      </p>
    </div>

    <!-- Education Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto">
      @for (edu of educations; track edu.institution) {
        <div class="card text-center flex flex-col items-center">

          <!-- Logo -->
          <img [src]="edu.logo" [alt]="edu.institution"
               class="w-16 h-16 rounded-full object-cover bg-white border border-[var(--color-border)] mb-4" />

          <!-- Institution -->
          <h3 class="text-base font-bold text-[var(--color-text)] mb-2 leading-snug">
            {{ edu.institution }}
          </h3>

          <!-- Degree -->
          <p class="text-[var(--color-text-secondary)] text-sm mb-3">{{ edu.degree }}</p>

          <!-- Period -->
          <p class="text-[var(--color-text-secondary)] text-xs">{{ edu.period }}</p>
        </div>
      }
    </div>

  </div>
</section>
